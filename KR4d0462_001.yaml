  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0462_WYG_001-1a, image: WYG1199/WYG1199-0708c.png}
body:
  text: 默庵集卷一元安熙撰古詩擬古次韻六首鬱鬱嵓下柏青青水中蒲嵓前有幽人壯嵗常獨居獨居亦何為不羡春華敷十年掩關卧門庭盡荒蕪美人殊不來日夕聽軒車零零白露下嵓谷悴芳蘭蘭悴不復辭誰與念時艱堅氷行復至雪深路漫漫愁絶將奈何撫几一長嘆中州有寒士塊然守空堂清貧久有信壯懷殊未央豈不願馳騁冒雪淩風霜振䇿萬里途超忽追鵬翔永念同懷人渺在天一方悵望不可見慷慨發清商獨處誰晤語百感摧衷腸人生諒難必且莫徒悲傷採柏空嵓下倚竹荒庭前人生非金石君心詎能堅君心或有渝賤妾終不疏天地一瞬息今古一長途借問離别苦君心竟焉如不見園中樹日日爭華敷秋風一夕至已逐嚴霜枯嵗晚不得去山空難久居崑崙一何髙出此無窮河遙遙何所往不啻萬里多一意在朝東日夕無停波逺遊計不早壯志成蹉跎夫君不我顧鬱鬱將如何覽物悟物變端居閲年華興來展遐眺緩步空山阿四顧渺塵世杉柏紛森羅吾樂誠何極憂子獨長嗟眷焉誰晤語一笑空烟蘿人生有定分所貴能樂天自慙失所守欲進安敢前思君重思君此情誰與宣舉頭見明月顧影徒自憐終當謝塵世洗心聞澗泉酬王治晝仲安少年不解事妄意欲聞道力小任匪輕今兹半摧倒生平寡師友恨不識君早所期親杖履函丈供灑掃盡出胸中疑為我細分剖竒章忽見示踧踖警中抱過許君豈然無乃習稱好摳衣或有幸同遊萬物表他年重盍簮㑹觀太平草和淵明飲酒我本山澤癯殊非廊廟英妄意羲黃上千載有深情豈無尊中酒持杯向誰傾遙憐崑丘鳳朝陽亦孤鳴願言躡髙躅要不負此生病卧窮廬咏靜修仙翁和陶詩以自遣適輒效其體和詠貧士七篇非敢追述前言聊以遣興云耳士生三季後倀倀渺何依空餘身後名炯炯留清暉自古有商顔冥鴻快髙飛白雲在空谷哀歌嘆安歸雖無首陽薇紫芝足療飢九原不可作撫巳良可悲我慚未聞道雅志慕羲軒力學非董生三年不窺園團茅借幽棲土銼寒無烟詩書化鄉鄰寧免朱墨研紫陽繼絶學汗簡多微言雖愚莫自棄感慨追前賢靜中有真趣非絃亦非琴耿耿方寸間千年有遺音手植庭下蘭竒香愜幽尋獨處誰晤語有酒還自斟西山蕨薇多長往夙所欽塵迹尚淹留低徊愧初心淵明守窮賤生平慕黔婁富貴如浮雲萬變紛相酬世運自興喪常恐德未周羲黃不可見日暮悵離憂乾坤一東籬百代無與儔寄語狂馳子擾擾將焉求顓孫遊聖門尚思祿可干所以後世士忘生慕榮官我生初未貧傳經易朝餐妻不解啼饑兒不知號寒水菽非甘㫖吾親亦怡顔簞瓢存至樂不須求抱關子雲辱天祿原思樂蒿蓬貧賤固易居貴盛誠難工士生或不偶髙節追兩龔世道有隆汙卷舒自不同萬古先天圗消長理誰通懷人今已矣嘆息將焉從被褐守長夜虛名愧中州舉杯對明月顧影念同儔消中雖有長四海嗟橫流不賴固窮節孰知身後憂商歌詠停雲奈此志莫酬三復淵明詩邈哉此前修是春久闕膏澤而連日大風不見天日晚登西臯歸而有作風霾連晝夕登臨望還迷空餘銜山日隱隱留清輝周嫠不恤緯魯女爭憂葵曳杖歸去來且掩荒園扉封龍十詠并序是山形勢宛如伏龍欲飛舉狀故名飛龍至唐始改今名龍首峰在山之陽髙二百丈頂有立石望之如龍角熊耳峰髙五百丈摩雲插漢峭出羣峰山之極髙峰也白雲洞在獅子峯後華蓋峯西天欲雨則雲從洞出霽則如婦焉修真觀在獅峰下中央平坦泉石甚盛宋政和中賜敕額迄今殿宇猶為山中之冠中溪書院在龍首峰下宋初李文正公昉于此受業山長張蟠叟等數人相與聚徒常過百人後廢于兵獨存夫子遺像及治平二年左周所撰夫子堂記中統初敬齊李公始為增葺仍奉㫖敦勵學者甚衆西溪廢址在玉石峯東北龍首峰西蝦蟆石下李唐隱士姚敬等棲遁之地宋時有九經張著為山長聚徒百人咸平之後廢于兵火峰巒明秀泉石清美雲烟竒麗真羣賢講學進修之所惜其無為興復之者蒙泉晝龕吟臺皆在中溪書院而敬齊置祠其間今亦皆蕪廢幾為樵牧區矣豫以養疴避暑寓修真者三月旦望必帥諸生謁拜先聖祠下暇日則杖䇿登覽攀危履險以窮全山之勝遂各賦詩一首且為叙次其略如此用貽諸同志者請偕賦之或可為山中異時故事云是嵗龍集柔兆敦牂神峰野客叙龍耳峰竒峯千仞髙突兀倚天表神龍幾何年俯首效蒼峭我行費躋攀坐睨寒木杪放懷聊極目巳覺塵寰小尚恨世纍拘未許謝紛擾會有賞心人相期拾瑶草熊耳峰窮探不憚逺行登最髙峰頓覺天宇近一洗羣山空竒哉此絶境造化天無功神襟一以曠寫我浩蕩胸逺意殊未極更思脫樊籠何當著神鞭駕此慵飛龍翩翩上箕尾再見開鴻濛長嘯暮雲合輕衣振天風白雲洞峩峩兩峰間崔嵬聳雙闕中有仙人洞恍若仇池穴朝開白雲生暮掩白雲滅朝昏有竒變宛與人世隔我來搴緑蘿深尋得幽絶平生棲遁志兹焉益超越未成長往計復愧固窮節永懷靜修銘凄其仰前哲㑹當結茆屋來此寄疏拙沉思畢舊聞長歌抱明月白雲應更深老眼益清徹未敢獻吾君聊爾自怡悅修真道館龍山古靈境連峯鬱蒼蒼林谷四環合修真據其陽怪石流通泉洞府餘清凉傑閣聳竒觀烟霏恣微茫眷豫平生心丘壑真膏肓今朝定何朝遂愜棲雲房晴嵐染衣襟頓覺塵慮忌矧爾羸疾拘快若脫縶韁月髙風露清空明渺銀潢蓬萊信非逺何處求仙鄉中溪書院炎氛絶髙岑悲風振林丘吟臺一以眺動我懷古愁李公英妙年于焉此藏修坐令山中民莘莘洙泗儔規模未云逺蕪穢餘嵓陬聖像空復存荒凉幾經秋不遇敬齊翁遺跡誰能求亦賴明主恩遂兹聖澤流今皇復神聖丕承擬西周絃歌獨不嗣嵓壑知應羞懷賢既伊鬱撫事增綢繆悠然發孤詠逺思浩難收西溪書院廢址世道有升降乾坤幾清磨誰知昔年中師生此絃歌我來愛佳名杖䇿時經過深尋得遺經山經信非訛龍首東昂藏玉石西嵯峨髙寒枕天井俯瞰無金科清泉下深池懸崖據陽坡浮野衆麓竒夾岸桑麻多對此竒絶境令人憶滄波誓將塵土蹤兹焉老漁蓑安得白鹿翁樂育如菁莪古人不可作嘆息將如何龍首玉石二峯巳見叙中玉石峯後有螺峯上有南北二天井極髙峻望之若天門山前有金榆科嶂山列峙左右龍池自古石堂北深谷中流出經院中而下蝦蟆石髙二丈圍百步其下書堂故基宛然朱文公知南康日訪得白鹿洞書院遺址復創禮殿書堂齊舍數十間仍奏賜敕額及御書石經版本九經因自號白鹿洞主云蒙泉作聖有竒功誰知在蒙養宣尼贊周經妙㫖存彖象千年紫陽翁人文再宣朗工夫益精密為我重指掌迂愚抑何幸久矣絶羣想果行復育德服膺未云爽兹焉得佳名悠然愜幽賞時至一濯纓無言道心長李相讀書龕嵓壑有竒勝縹眇餘風烟石室誰所留尚倚蒼崖巔慨想龕中人于今幾何年遺跡雖未泯山深月空懸伊豫陋庸姿復苦塵務牽此道難坐進低頭愧前賢尚幸忝私淑靜修有薪傳終當謝浮世于兹訂遺編吟臺步上吟臺荒極目但平楚四顧渺無人持杯欲誰語心期反招隱自笑非梁父抱膝一長歌商聲振林莽敬齊祠桂樹徒芬芳祠宇亦荒廢絃歌無餘響香火誰復繼前修日以逺令人發深喟舉觴酹飛泉悲風起橫吹髙節婦詩并序九原髙氏女嫁為豐州郭叔文妻年少無子叔文蚤世病且死屬髙氏以供養其母髙諾之叔文既死即斷髮為信居三年其父母憐其少執義也將取而嫁之髙聞之即復刺墨自鯨其面以死自誓今十餘年矣州上其行禮部令旌表之叔文之友天山元君子文為豫言其行實如此且請詩而叙之嗚呼異哉豫讀歐陽子五代史觀其所序死節死事及叙王凝妻于雜傳之中未嘗不廢書而嘆也今觀髙氏之行又有以信夫天理民彞真不可泯滅而重嘆夫士不知學之害流于後世而未巳也嗚呼使百世之下聞髙氏之風其必有深感于斯者矣學絶道喪今幾年善俗如灰不得然士知苟祿為得計偷生忍恥不自憐嗟嗟此婦乃爾賢不本教育由天全信兹秉彞不可泯直與天地相後先太行西北黃雲邊平蕪落日生寒烟髙節凛凛誰當傳後人歌我節婦篇默庵集卷一
