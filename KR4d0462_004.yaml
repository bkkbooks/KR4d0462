body:
  text: 默庵集卷四元安熙撰遺文趙氏子名字序方齊趙君為豫言二子守中居中既冠而有室亦既抱子矣而字尚闕焉餘三子則又成童而未名也子盍為我名而字之豫應之曰古之人生子三月父咳而名之二十成人加冠于首鄉先生醴而字之此禮之正也今成人已冠而字之固無可疑餘則非所當及也奈何方齊曰老夫末疾侵淩亦既耄矣及今少康且幸時得與吾子相周旋于此焉字而戒之使他日既冠覩其字而惟其義若古人之佩韋弦者而自警焉以不忘父師平昔之誨變而不失其正不亦可乎哉豫曰唯唯既字守中以貞居中以庸又取易中庸之言名其三子曰麗中擇中久中而以亨仁恆字之又皆以伯配稱焉蓋字因名而生而取名者又各以類也方齊復請記其說故書以授之大德癸卯閏五月既望默庵書御史哈喇公名字序近世種人居中國者類以華言譯其舊名而稱之且或因名而命字焉是則雖非人道所當先者而亦古人之遺意也監察御史魯都爾沁故行省左丞資善公之嗣子系出奈曼哈喇氏用䕃授厯監濬邳兩州惻怛愛民剛果清慎興學禮士藹然有聲既終更家居待次益自力問學以求其所未至間從豫逰溫恭自虛刻意清苦吾黨之士鮮能及之于其請字也為取嵩髙之詩所謂戎有良輔文武是憲者以良翰易其名且以周書亂為四輔之語合而字之曰憲輔蓋亦因其舊名而又因名以制字也以公之材而進學不巳如此他日德業所就或無愧于古人是則必有非豫所能及知者矣大德甲辰冬十有一月甲子日南至送安從道序吾安氏受姓始于漢顯于元魏而行于唐宋其望則自凉州武威并代諸郡而蔓延于天下古禮既亡譜牒職廢無有能明其所自出者則固無由考其族屬之逺近矣然萬殊而一本雖百世之逺其同宗之道必猶有可言者沁陽安從道由嵗舉來為燕南憲府掾以宗盟之故拜吾親堂下執子弟禮甚勤家君特器愛之吾和仲弟相得尤歡獨豫以夙疾侵淩偷安里社不獲欵焉適自山中歸覲省而從道還遷河東别且求言故書此以贈從道名好古幼為儒資通敏奉職廉勤用法平允人咸稱其仁恕云至大庚戌陽月甲子神峯野客安某序醫學諭諸生文醫學有源尚矣其設官立教則周官醫師掌醫之政令聚毒藥以供醫事凡邦之有疾病者造焉則使醫分而治之嵗終則稽其醫事以制其食疾醫掌飬萬民之疾病四時皆有厲疾以五味五穀五藥養其病以五氣五聲五色視其死生兩之以九竅之變參之以九藏之動凡民之有疾病者分而治之死終則各書其所以而入于醫師此其見于經者然也下及近代稍復古制至于我朝上自京師以至列郡州縣各設師弟子貟比于儒學此蓋列聖之所以惠活元元澤被四海于以廣博施濟衆之仁也某極愚陋猥承人乏掌教兹邑而邑長諸賢舉行教條其所承流宣化思濟斯民而廣皇家好生之政者可謂無餘藴矣漢儒之記禮曰玉不琢不成器人不學不知道雖有嘉殽弗食不知其㫖也雖有至道弗學不知其善也先聖之言曰多聞闕疑又曰就有道而正繼自今以往凡吾醫之登此堂者其務于勤學好問而恪慎其業兢兢焉栗栗焉常以主司人命為重而不敢有一毫肆然自足之心有所疑焉得以幸告于某而相與質難以求至當之歸是乃國家設教興學之意賢侯惻怛愛民之心而某之所深望也可不勉哉題劉靜修石鼎聮句圗詩後玩世如一鼎姓名誰得聞仙翁應自笑知我有鄒欣此泛翁先生題石鼎聮句圗詩也蓋朱夫子當謂軒轅彌明即韓公姓名而于參同契考異後亦自書空同道士鄒欣今觀先生所以容成孺子自謂者其亦若此也與暇日讀選詩郭璞逰仙第六篇喟然有感聊記于此以俟後之君子云至元癸已臘月既望鎮州安某謹識逰水竇嵓題名神峯道人以大德癸卯正月戊午晦來逰兹嵓觀浮休石刻長吟坐嘯于飛泉怪石間飄然若有得也同行者曲陽令董侯士良平江路監稅宋鼎門生王俊民道人則安某敬仲父也慎獨針可尊者德可畏者天無處不有無時不然念慮之發必有其幾勿隱其隱勿微乎微從事于斯是曰慎獨自此精之萬物並育毫髮有間天理弗存利欲紛拏厥心則昏嗚呼戒哉敬作此針書諸座隅以警其心祭劉先生文維至元三十一年嵗次甲午六月庚辰朔越四日癸未後學鎮州安某謹以茶果清酌之奠致祭于集賢學士泛翁先生之靈嗚呼哀哉山頽梁壞天不憖遺生榮死哀孰不摧慕嗚呼哀哉某也晚學無知幸蒙私淑黽勉勵志于兹七年顧以鈍駑鞭繩罔及學不加進頽墮無成尚企宫牆灑掃函丈親承聲咳大啓愚衷孰謂難期不就此志俾兹凡陋抱恨終天嗚呼痛哉矧惟先生至誠樂育憐某之愚欲收教之謂我當來政此閒適斯言在耳耿耿如存今其已矣將安倣矣先生此恩何日忌之兹焉奔赴奉奠以贄舉觴以慟薦此哀誠嗚呼痛哉仰止前修精思力造親賢取友進德修業某雖不肖敢負初心伏惟先生冥鑒臨之嗚呼痛哉尚饗祭董少中文維至元十一年嵗次甲午十一月丁未朔越二十有八日甲戌晚生安某謹以清酌之奠致告于近故太中大夫致仕董公之靈曰維明公氣豪志雄卓偉俊才博究旁通真人勃起英賢鼎從謂公國士乃達宸聰㑹遣相臣綏撫于東詔公與往參贊戎功自是以還疊試邦庸晚持憲節攬轡觀風致政來歸白首方瞳世故之大事變之空消長之極代謝之窮有以自得坦然胸中優哉遊哉燕處從容玩易一編鼓缶待終堂堂達尊羣儒所宗天不憖遺哲人之凶嗚呼哀哉某甫弱冠拱手趍庭實始拜公德容粹清公不我鄙誨語丁寧晚益愛我期許非輕謂子可語撫接彌傾執手晤言罄竭平生謙冲雍穆展矣老成每懷瞻佇若仰晨星今則巳矣誰復儀刑聞公之訃怛焉內驚奠觴寢門無從涕零神魂如在尚鑒衷誠嗚呼哀哉尚饗建祠堂奉遷祖考文維大德六年嵗次壬寅夏四月乙丑朔越二十有一日乙酉嗣孫某敢昭告于顯髙祖考修武府君顯髙祖妣某氏夫人顯曽祖考三府君顯曽祖妣王氏夫人顯祖考二府君顯祖妣宋氏夫人顯考石峯府君顯妣賈氏夫人神位前祠宇初建主室既成恭奉尊靈永奠厥處考禮經辨昭穆以伯祖考大府君伯祖妣王氏夫人及亡室劉氏分祔東西兩序配神從祀謹告神主入祠堂致告文維大德六年嵗次壬寅夏四月乙丑日朔越二十有一日乙酉嗣孫某謹以時果清酌之奠昭告于祖考之靈曰嗚呼我家自金源板蕩以來失其所安石峯府君兵後至真定實維再造有家凡今日之子孫孰非蒙其休庇者耶先兄進士府君早嵗馳聲名卿交薦將為世用不幸中年隕世而嗣子思誠亦就夭折次子燾就室他氏某是用大懼祇奉遺訓權主祀事兢兢朝夕惟恐弗堪以墜先業中罹多故徙近東郭以便先墓之灑掃轉徙區區靡有定處恆若泛宅者亦既纍年矣越大德丁酉乃營是宅迄于今兹僅能搆此祠宇以奠祖考之靈怠緩不虔無所逃罪抑有由也嵗時薦享某雖衰尚須黽勉以躬執厥事俟孝孫燾卜居有定當議考按禮經屬之奉祀而使男熙等相與佐之所供庶品稱家有無亦當别為區處俾之可行久逺而無弊庶子子孫孫勸忠勸孝追逺敬宗以無忘祖考垂裕後昆之意兹因遷奉神主入就室位先事以告伏惟祖考實鑒臨之謹告封龍書院釋菜先聖文維大德十年嵗次丙午秋七月已已朔越翼日庚午後學安某敢昭告于先聖至聖文宣王某至愚極陋總角趨庭私淑諸人實始聞道自兹厥後欽誦遺編近本程朱上窺思孟以求經㫖以探聖心庶竭駑頑進德修業孰云不力中道而迷悲歎窮廬摧頽已甚雖由病廢實亦惰偷內自省循枯落是懼兹焉感憤避俗嵓居追憶舊聞卒究前業灑掃應對謹行信言餘力學文窮理盡性循循有序發軔聖途以存諸心以行諸巳以及于物以化于鄉或兾有成不悖于道兹㳙吉日載見祠庭㫖酒蘋蘩式陳明薦尚蘄啓迪實誘其衷庶假威靈不至大戻謹率諸生恭修釋菜之禮用伸虔告尚饗釋菜告李學士祠文晚生安某謹致告于故翰林學士敬齊先生李公之祠兹以吉日恭修釋菜之禮于先聖惟公中朝耆舊鄉郡碩儒博學髙文為世所仰載瞻遺像薦此豆觴公如有靈尚克歆享謹告默庵集卷四
