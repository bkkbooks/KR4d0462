body:
  text: 默庵集卷五元安熙撰遺文石峯府君行狀君諱滔字巨源姓安氏其先太原離石人世為儒家曽大父諱玠官修武校尉妣某氏大父諱全廣以資雄鄉里所蓄書幾萬卷妣王氏父諱升妣宋氏再世皆不仕君生于金承安四年九月庚戌自幼讀書家孰大父躬為訓授年九嵗以經童登第復習詞賦舉貞祐初河朔震動金主南徙都汴衣冠士族亦皆南渡設科選士如平時獨山西諸州恃險不降王師至則藏匿山谷去則復出衆庶頗安以故君不克應其選嵗丁丑君家避兵石洞軍士以火逼之舉族皆死君僅得出為所執時太師國王以諸州久拒不下親往用師令無男女少長皆殺違者以軍法論君既被執而監軍事舒穆嚕辰努聞獲一儒者馳使呼之至則易以敝服詭其鄉里令朝夕從之由是獲免君自以當此大變舉族皆沒幸全性命遂委身從之誓不他適君時年十有九實貞祐五年也嵗壬辰從舒穆嚕辰努來山東至真定之藳城辰努與之田宅使定居而教其子焉戊戌朝廷設科取士中者復其家終身君以詞賦髙等中其選于是始以聚徒講授為業壬子籍天下户數遂占籍真定而徙居焉中統二年參議中書省事張公德輝熟君學行招延之授館其家使教其諸孫至元三年郡博士遂舉君二其學事享年七十有八至元丙子正月甲戌以疾卒于所居之正寢越五日戊寅葬藳城縣安仁鄉新里之西原從遺命也君天資寬裕樂易慈愛忠厚不妄喜怒與物無競治身儉薄不苟受施有貞白之操雖貧困乏絶惡衣疏食或不能給安焉未嘗有戚戚之色與人交重然諾一以誠意無所矯飾與人言開心見誠無纎葉吝意聞人之善稱之如已出人有過則掩焉而未嘗出諸口也平生與人無所怨惡與鄉人處飲食言笑終日油油如也讀書務躬行不徒事章句晚而學易嗜伊川程先生傳讀之未嘗去手其教人嚴以有禮恂恂愷悌得師之道終日娓娓無倦色少明于經學其授讀率皆口誦焉有生徒習舉業者在席之久必辭之曰吾不經場屋汝當别求先進而師之可也其真實又如此平生未明而起環堵蕭然不以聲利榮達為事淡若無求于世得喪欣戚鮮能動其心即所居自號石峯以示不忘鄉里隱居教授餘三十年貴人子弟往往出其門者君但訓敕諸子晦迹讀書不求祿仕優遊自樂以終其身嘗語諸子曰寧人欺已勿已欺人可也家有一力一旦亡去諸子欲追之君曰縱使追還彼既負罪必已汗顔又安能朝夕相處乎乃止弗追嵗戊午携長子芝西歸田園盡為族人所鬻皆不敢隱謂君曰某氏宅某氏田俱君家舊物我實冒鬻願承其罪君當聞之官復其直而取之君以世變擾攘有非人力所能與者彼何罪竟辭不取但修完先壠而還延安府尹牛子益總管袁某少與君同里閈因君內弟米脂尹宋某致書勸歸鄉里且遺以束帛君不受曰吾既未能即歸且又貧困無以為謝安可虛辱答其書而還其幣從軍攻鳳翔時主帥令分殺諸俘虜君所得必多方為匿而遣之時僵尸蔽野軍士悉解其衣裳服之君雖寒甚不忍也其平生處心制行類如此君既沒府之士夫皆為詩以哀挽郡教授藜軒先生吳君特起序之以為君之為人明而不察簡而能肅犯而不校又謂君隱不違親貞不絶俗樂天知命君子云初娶同郡李氏沒于兵間生一女適劉氏再娶磁州賈氏有賢行君不治生事河朔當大變之餘兵凶相仍諸子幼弱生計未立貧困殊甚人不能堪夫人省衣節食周旋其間有人所難能者治家嚴正有法閨門之內肅如也後君二年年八十有四卒子男三人俱業進士長芝嘗為張公德輝所辟為山東行中書省掾前卒次松嘗為將仕郎次筠承事郎同知綿州事卒于官孫男九人長思誠早卒次燾亦進士次汝止烈熙煦汝諧汝弼次未名而夭而汝諧汝弼亦既冠而卒女五人長適易縣尹苑大亨之子弼次適同知真定路諸軍鄂囉總管府事喬嶽之子木次適張氏次夭次尚幼曽孫男七人康寧昭寧得寧寶寧泰寧延寧來寧女五人子寧宜寧順寧福寧喜寧而得寧順寧皆夭玄孫男一人慶源女一人慶雲君自祖曽而上纍世皆葬太原離石縣北下安村之原君之父始徙居孟門之義居丁氏莊因葬其處君既至真定樂其風土而居之遂命葬焉然以其藏瘞之制昭穆之位有不能如禮者是以嘗欲更葬而力有未能遷延嵗久每一念之未嘗不愴然也今乃卜以元貞二年二月庚申奉君夫人之柩遷于先兆之北凡相去二十步不肖子松竊惟先君以末世之孤裔奮焉為起家之始祖使松輩蒙休被蔭獲沾祿澤子孫繁昌者其潛德隱行不見于世今已不可得而考其迹矣不有表焉以垂于世大懼不肖無以顯揚之謹追述其平生之大略如右以請于當世立言之君子伏俟采擇大德辛丑夏四月已卯孤松狀右代作故承事郎同知綿州事安公墓志公諱筠字庭實姓安氏其先太原離石人考石峯府君滔妣賈氏府君壬辰後徙真定遂為真定人公生于壬辰年九月庚戌既冠從提舉真定路學校事侍君乘之學受進士業燕南河北道提刑按察使馬公某辟為從事後以御史中丞史公彬薦除河南山西提刑按察司知事轉山北遼東遷河西隴北道按察司經厯秩滿移陕西漢中至元二十八年更按察官名肅政廉訪就充本道經厯改同知綿州事元貞丙申十一月戊子以疾終于成都之寓舍享年六十有五纍官承事郎公天資誠孝而意氣豪邁其遇事接物虛懷以應坦然無疑心為政知大體其于吏事初不經意及案牘滿前條析剖決雖素精于其事者不能及也在憲司幕府近二十年多所贊益如御史中丞程公思廉參知政事姚公天福皆嘗同事亟推重焉其餘所交亦皆一時名卿士夫作詩善唐律自少時落筆輒驚人語意雄健至老不衰又長於近體樂府晚嵗聞義理之學深所敬信取易象懲窒之語以損名其齋其佐河東也先祖墳墓田宅皆在屬邑兵亂以來田宅盡為他人所有墳墓亦荒廢久不復知其處公訪求故老舊族始得之皆為增築墓垣刻曽祖而下宗支于石祖考妣墓嘗為山水所圮復改葬之既諸所占田宅者皆疑懼不安公諭之曰吾豈恃勢力為此事者耶其他行事亦多類此公凡再娶前夫人李氏來歸二年而卒生一女適易縣尹苑大亨之子弼後夫人孫氏子男三人汝止汝諧汝弼女一人子寧越明年大德改元夏四月孤汝止奉喪歸真定卜以其月癸卯葬藳城縣安仁鄉新里西原先君墓左伐石以志其嵗月謂某當書之某不敢辭并略敘其平生梗槩刻納壙中從子某泣血謹志樂府酹江月登古容城有感城隂即靜修劉先生故居天山巨網儘牢籠多少中原人物趙際燕陲空老却千仞岩岩蒼壁古柏蕭森髙松偃蹇不管飛氷雪慕羶羣蟻問君誰是豪傑重念禹迹茫茫兔狐荆棘感慨悲歌發纍世興亡何足道等是轟蚊飛滅湖海襟懷風雲壯志莫遣生華髮中天佳氣會須重見明月前調前日歸途偶記和仲欲把鋤犁門人願助之語甚恨不獲請其詳而亦竊喜其先得我心之所同也中夕不寐率爾成章寫寄和仲可為後日相見一笑大德乙已上元日神峯野客書世途艱阻正堪悲萬里清秋搖落况復乾坤還閉物奚啻切牀膚剝消長盈虛循環反覆夜半驚孤鶴東君著意惠風先到嵓壑悅親原有清歡簞瓢食飲不害貧家樂多病留侯空自苦慚愧長身諸葛素手躬耕卧龍岡上準備豐年穫豚蹄社鼓幾時同醉寥廓吾家桑梓在卧龍岡之陽太常引和王治書仲安求田問舍欲婆娑算無地不風波胸次儘嵯峨世間事知能幾多登山臨水傍花隨栁獨此未消磨便擬借行窩正霽月光風氣和石州慢寄題龍首峯虎踞龍蟠朝楚暮秦世路艱蹇夕陽淡淡餘暉閶闔九重天逺千秋萬古先天消長圗深何人解識興亡本夜鶴渺翩翩儘平林鴉滿蕭散不須黃鶴遺書不用洪崖相挽蒼狗浮雲平日慣開青眼擬將書劒西山采蕨食薇自應不屬春風管只恐汝山靈怪先生來晚鵲橋仙徘徊尊俎徜徉笑語俯仰乾坤今古世間豪傑數元龍想未識聖門風度也非學圃也非懷土靜看落花風雨安排便買釣魚蓑底是滄浪深處默庵集卷五
