body:
  text: 黙庵集卷三元安熈撰遺文齋居對問或有問于余者曰子之為學其亦有以異于人乎何其踽踽涼涼獨立而無徒也余應之曰余自趨庭日以誦讀六經與夫孔孟之遺書為事幸而私淑于師友而與有聞焉乃知用力于周程夫子以及朱夫子所以繼往聖開来學之書亦將以求夫千載不傳之傳者以治吾心而修吾身焉而已矣又何暇他求為哉或曰然則子之所學其世之所謂道學者耶余曰固然也道之大原出于天其傳在聖賢伏羲神農黄帝之所以繼天立極堯舜禹之所以更相授受成湯文武臯陶伊傅之所以為君為臣皆此道也吾夫子既不得君師之位以行之獨以列聖之所以相傳者筆之于經將以傳萬世曽子傳之子思子思傳之孟子孟子没而其傳冺矣自是以来千載餘之間士子溺于記誦訓詁詞章之習以希名射利不復知有聖人之學而又有異端之邪說以間之不有真儒者出孰能有以明斯道于既晦而振百代之沉迷乎是以濓溪夫子不由師傳黙契道體建圗而著書二程夫子見而知之擴而大之然後斯道復明于當世至朱夫子則求其所以用力于喜怒哀樂之未發者而得乎所謂天下之大本與夫古昔聖賢相傳之心是以有以集周程三夫子之大成而折衷之而道以大明既又以為道之所以不明由說經者之不足以得聖賢之意于是竭其精力以研窮聖賢之經訓作為傳註以著明之至于一字未安一詞未備亦必沉潛反覆或達旦不寐或累日不倦必求至當而後已故章㫖字義至微至細莫不理明詞順易知易行所以妙得古人本㫖于數千載之上使讀而味之者如親見聖賢而面命之其闗于天命之微人心之奥入徳之門造道之閾者可謂極深研幾探賾索隠發其㫖趣而無所遺矣至語學者入道之序則又使之先讀大學以立其規模次及語孟以盡其藴奥而後㑹其歸于中庸尺度權衡之既定由是以窮諸經訂羣史以及百代之書則將無理之不可精無事之不可處矣此朱夫子之所以繼徃聖開来學而大有功于後世獨以世衰道微知徳者鮮俗生鄙儒膠于見聞安于陋習是以不能有以與于此而目之為邪說者也或曰子之說誠美矣然世之名卿有自以文章為得計而謂不害兼通乎道學者又有自以為真得聖賢之意而謂朱子解經流于詖滛邪遁異端之說惑世誤人而不自知著為成書以辨之者是皆學者靡然向之此又何耶余曰皆非也為前之說者其害淺而小為後之說者其害深而大彼自以文章為得計而謂不害兼通乎道學者其意但出于恐知道者之議已而為是說以文之耳其自以為真得聖賢之意而輕視前賢妄肆詆排庸俗鄙陋淺薄不經而髙談大論旁若無人藉是以濟其私而為欺世取名之計學者方以謏聞淺識未知所向乃併與其心術而壊之則其為害豈淺鮮哉此予之所以日夕深懼而莫知所以救之者而子尚以是而為疑耶或曰國朝自元統以来大儒先生以此道相繼而為天下倡或達而在上以致君而行之或窮而在下以推明前聖後賢之意以淑諸人以傳諸後砥柱屹然壁立萬仞者今子以眇然之身而區區焉以是為學其不起謗議而害身也㡬希矣子其亦以是而思之乎余曰不然夫道固不以窮逹而有加損而人亦不以窮逹賢愚而有異也是其所以親承其心授精微之㫖而羽翼斯文者其傳固有在矣但人之為學則皆當以是為的而求之庶無差失而可以造夫道之極致是又安得顧世俗之譏議畏迂儒之曲說屈巳徇物顛倒迷惑而昧于所從哉或曰彼之所疑盖必有以真見其失而後為之辨也且子既不之許曷不揚言于衆以明曉之乎余曰彼之為學我知之矣盖嘗得其書而讀之見其于朱子之說多有不得㫖意而妄疑之者甚或不能知其句讀語脈之所在而遂疑其平生為學始終之致及其所論著或未之見故其所論掣肘矛盾支離淺迫殊不近聖賢氣象以此推之則朱子之語脈㫖意尚不能知又安能指其罅隙而非議之也哉原其本意盖欲藉是以取名而率然立論曽不知其為害之甚也使其年益髙而于天下之理玩之益熟一旦幡然盡棄其學而學焉則吾知其必當憤然悔其前日之為而火之矣况君子之學赤反經而巳固不當屑屑然輕與之角勝負于一日之間也至于甚不得已而不能不辨焉則亦有所不得而辭者矣或者唯唯而退時余方欲為之剖其疑而折其辨以發明朱子所傳之微意因悉次其語以自警云至元甲午臘月丁亥書于逺逰齋記齋名予少與白霫烏君叔備友講論從容無日不相從也嵗丁亥叔備始從容城劉先生受學凡所授精微之言某亦得與聞其一二由是始慨然有志于正學而不迷于所向者皆自先生之語發之也自此益相親厚毎一来所聞必益超絶盖欲相率同門以卒此業者于今七年矣不幸未能得遂叔備南去㷀㷀獨立頽惰無成而先生亦既謝世今則巳矣勉力大業之志卒不能有以少遂矣然先生之言拳拳服膺未嘗敢墜暇日讀先生遺詩則又往往皆是語也先生之誨我亦諄諄矣某雖至愚敢不加勉遂摭取先生詩語以逺逰書于齋之楣間坐對觀省庶不忘先生之訓且以為鞭繩之助云至元癸已秋分日石州廟學記石州新修廟學成從兄仲舉父寔為郡文學遺書語某曰吾州居并之西南夙稱名郡然其廟學荒茀不治則有年矣粤大徳辛丑知州事酈侯某始慨然謂其僚屬曰夫子之道垂憲萬世有國家者所當崇奉見之于詔㫖尚矣今而墜廢若是其何以仰稱我國家尊嚴命祀之意而移吾民之觀聴哉此長民者之責也即以其年度材致用悉撤其故而一新之上下競勸不日告成殿堂齋廡靡不嚴備象設位序應圗合禮獨大門未立適以癸夘地震之變而止後三年丙午今監州阿勒坦公下車以故事謁于堂下顧瞻俯仰惜酈侯之功止于如此為之太息即有志焉首選邑之秀民子弟充州學生仍撥係官間田若干畆以供養士之費賔禮師儒暇目躬率僚吏聴其講授絃誦洋洋聞者聳動而又以餘力建大門具祭器以終酈侯之事而某適于此時猥承人乏掌其學事今亦將終更以去矣邦之父老僉謂廟學之成其難如此而邦君𢎞文興化以恵教我民之意又如此豈可使我之人無傳焉合詞懇予願著石章今其材巳具子其以我故勉為鄉人記之且因有以開示其子弟之願學者則尤幸也某竊惟古先聖王繼天立極建學立師以教天下後世使皆有以明夫三綱五常之道而不失乎民生日用彞倫之常而其為教則必始于洒掃應對進退之節禮樂射御書數之文而修其孝弟忠信以立其本然後從而教之格物致知以盡其道使知所以誠意正心由身及家自家及國而達之天下其說具于易詩書春秋論語大學中庸七篇之書此二帝三王作為君師躬行心得之教吾夫子顔曾思輿之傳而近世大儒周程朱子之所推明者也國家稽古崇儒建立學宫周徧海内然而此邦獨至于今乃始克應明詔則以為有司者急于簿書期㑹之為功而不能有以祗承累朝徳意之美故耳然則邦民士子被賢君侯之化其幸為何如哉雖然聖人之言具在方冊學者誠能從事于古者小學之書而勵志乎孝弟忠信禮義㢘恥之行則學之本立矣然後先之大學以立其規模参之論孟以盡其藴奥而後㑹其極于中庸于以窮諸經訂羣史建立大本經綸大經讀天下之書論天下之事無所為而不成無所處而不當其于窮理修身齊家治國及平天下者真無以見其難矣某愚不肖曷足以與此顧念先塋所託獨未克展拜掃修謁之敬嘗以為恨今乃獲因文字託姓名以紀吾邦之盛事兹誠大幸矧重以仲舉父之命耶是以忘其固陋承命不辭為之識其本末如此因竊并記所聞示其諸生俾母忽其邦君之教且又以告夫後之為師弟子者使亦皆知所用力焉酈侯某郡人今為某官阿勒坦公某族人好賢樂善本乎天性由宿衛王府授今職勤政愛民多可紀云又明年丁未陽月既望龍岡安某記與烏叔備書五月一日某頓首再拜叔備畏友執事從善歸雖不奉教就審侍履從容足慰懐想但相别踰年不得以㑹晤為深恨耳前月十九日聞汎翁先生訃音即以一書附驛使持去必已達斯文不幸山頽梁壊後學無所師仰痛哉痛哉恭惟義重心喪哀慕純至何以堪處伏願節哀俯從禮制是所深望某學晚無知幸蒙私淑及尊兄誘掖似覺少進但一二年来離羣索居頗似頽惰然欲見先生之心無須㬰忘夢寐之間如或瞻仰而先生亦屢辱見聞欲教之意甚厚所望一拜徳容俾列侍下得少伸鑽仰之志此莫大之幸豈意天喪斯文而先生没矣痛哉痛哉終身之恨也而今而後惟有一意問學親賢取友勉力孳孳死而後巳庶可上不負先生私淑之教中不負朋友期望之心下不負某愚勉力大業之初志也顧念無以報先生之恩獨有奔赴几筵一致薄奠舉觴大慟以薦此哀誠庶乎其可已不審髙明何以見教又意尊兄必往致奠故且尼其行引領以俟車從之過欲藉提挈之力耳早命駕甚幸所欲言者甚衆俟相見得以面叩耳人回姑此奉寄竊兾進學自愛不宣又七月日某頓首再拜上啓叔備尊兄侍史一别七年豈勝向仰人来獲聞動静聊以為慰又聞春間嘗以酒致疾雖已得愈然中情猶不能釋然也即辰新秋猶熱恭惟調攝有道侍履益以康佳矣然尊兄早親有道篤志力行人望所屬不可不重為此道保惜也願兄留意更加慎節以迓新祉以慰友朋期望之意幸甚幸甚易說精要想已就緒丁亥集赤當脫稿恨不得陪侍左右側聞髙論也某一来此行及三載獨學無友益以荒惰然隨分讀書小作程課玩心觀理更于應事接物間體驗警省亦畧有效但覺悔尤山積尤日夕増懼耳四書集義精要近因讀朱子文集對校一過尚多有疑誤别紙録呈前書索寫一部為無善書者不曽寫得幸因書来將某前後録出納上可疑條段以一言可否之使得有所據依改正納上也疑此書初脫稿先生未使學者校勘故多有此誤雖非大義所闗然亦不可不訂正也近因看詩傳亦欲取朱子文集及語録之言凡渉論詩有與集傳相發明者依精要例寫出以便初學亦似有益然亦未暇寫出也又嘗病讀春秋者只知讀左氏而不讀正經欲節取左氏傳文議論叙事本末始終依倣通鑑綱目作小字註之經文之下以類相從各附本句凡左氏浮夸乖戾之語皆刪去之秦漢以来大儒先生之言及諸家說可取者亦畧節取附註其後庶觀春秋者有以考傳而讀左氏者赤知有經其大㫖一以朱子為本而達于張程以求聖人之意不審髙明以為如何其他所欲言者甚衆千里相望𣺌不可得極思向来承晤之樂復何時而可遂耶伏紙引領不勝馳情因便不惜痛加鞭䇿至幸至幸此間惟王仲安時相見渠讀四書甚有得處時與之語赤多有警助去嵗又得一王儀伯年二十五六曽從董宗道受四書詩書傳好學不倦作文字亦可觀嵗一至山中時来晤語也與叔父書八月二十日從子某頓首再拜上覆叔父座前七月二日白天民来得拜手墨兼就審尊體平復深用欣慰即日秋凉伏惟尊體起居益以康佳叔母兩兄以下俱無恙此間大人以下俱如昨大人自有書老母目疾已如此未聞愈期但身體粗康健飲食亦不減賴此差自慰耳三月中為煦弟娶婦然凡家事次第猶未整理所居又議遷徙恐直至年終方得定疊也又承秋莫欲東還至河北此某輩夙昔所望也幸幸真定今年粟麥頗賤易以居止叔父晚年得守墳墓與大人相聚以教諸子弟姪何樂如之想尊意赤已及此矣又謂某讀書次第當以古人用心處用心則可毋以今日虚名被擾此固某愚平生為學之本志而不能遂者今承尊諭恨不得拜侍而卒請其目也盖某自少聞汎翁先生道學之裔即心恱而誠服之慨然有求道之志以為為學而不往見真可謂虚生者豈意某愚立志不勇乃至于此每一念之未嘗不悲恨也何時遂侍究此衷情新舊所作詩文今以録呈亦可以少見愚平日之志矣而今而後某獨學無友益以為懼伏望叔父有以見教千萬至幸餘不能悉蕭惟斗詩近于白天民處見之或别有甚文字令百六弟録得寄示亦可六原二弟讀書無令輟叔父果還真定時朝夕教育某願任之白天民說三兄四兄各失一子不知為誰再書批来某房下去年舉一女名宜寧今已能行矣并及之鄂州時有来書二姐及歸寜俱安世臣在理問所中甚平善二兄自有書苑甥自有書不縷縷時向莫寒伏乞順時益加保愛千萬至祝不備某再拜叔父座前黙庵集卷三
