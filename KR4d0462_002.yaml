  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0462_WYG_002-1a, image: WYG1199/WYG1199-0713c.png}
body:
  text: 默庵集卷二元安熙撰律詩次韻書事野性元孤潔無朋儘自皤業荒聞道淺靜久閲人多靈鳳寧棲枳冥鴻本避羅南逰有髙興何處是滄波夏夜即事未遂平生志求田擬種瓜天遊華表鶴井坐子陽蛙世事一場夢俗情三月花興亡天不問閲盡幾年華次鄂屯遂初韻滄海終成陸靈椿㑹有秋百年真夢境八表欲神逰惡木除難盡驚波逝不留年來萬事懶直擬付休休次韻答王仲安林宗自憂世宋玉祇悲秋病鶴塵中老冥鴻天外遊羡君巳超逸愧我尚遲留不為西風起蓴鱸興未休病中齊居雜詩次和仲韻五首深居苦羸疾誰與破愁顔世態浮雲外交情暮兩間襟懷期齊月胸次要全山夢寐神峰久何時恣往還時事今如此幽居獨慨然心期鐘鼎外身世水雲邊病骨便清晝髙懷惜壯年前修渺何在目斷夕陽天靜中觀四子掩卷慕朱公所幸斯文在殊非吾道窮衆星元拱北萬水自朝東逺意無人㑹芳樽誰與同故人南郡去髙隱近隆中雅志希前哲深慚接下風踈狂聊自適衰懶欲誰同且莫鯨吞慣牀頭酒易空多病交遊少相看動浹辰賦詩聊遣興觀化足怡神問字有知已過門無俗人伊誰同此樂願卜許東鄰清明日大雪飲齊中不愁飢苦互相侵念此愆陽與伏隂飲繫經綸須暢飲斟存燮理要平斟舞雩自有春風樂茅屋難忘魏闕心杯酒空持詎能醉商歌聊爾發悲吟次李樞判容安亭詩韻問舍求田計未成登臨搔首愧平生聫名丹闕渾無望招隱洪崖久寄聲短笛長歌樵牧事浮雲流水古今情相君許借容安住擬向南陽約孔明李公别圃有容安亭李公見和復次答之少年學道竟何成章句區區已半生不向靜深觀物理却從搖落聽秋聲過門載酒鄉賢意授室傳經邑宰情從此嘉陽風景别太行山色看增明嘉陽平山邑號奉寄仲章兄世事悠悠豈易量眼中存沒幾參商詩書有得將誰語菽水無從亦自傷春色池塘想同夢暮雲樓閣渺相望何時樽酒篷窗底風雨瀟瀟夜對牀寓館秋日即事多病筋骸久痺頑柴荆終晝掩重關詩書詎可資耕釣杖屨元非絶往還莫遣浮雲蔽白日儘教秋色對南山平生願學程夫子慙愧春風滿座間和王尚書獨坐詩韻棲遲蓬蓽養慵疏虛室焚香靜掩書坐進工夫元自爾心齊意味果何如聖賢名世幾千載皇極經年十萬餘至理悠然與心㑹恍疑身在先天初尊兄仲舉父典教石州鄉郡紛紛世纍苦相牽撫事悲歌惜壯年卜隱未成長往計傷時空賦逺逰篇林宗雅志伊誰識張翰孤懷亦自賢見說家山風物好幾時同倚暮雲巔冬日有懷故人病鶴孤鳴在九臯虛名多纍恐難逃殘陽入谷隱猶見新月穿雲出未髙江上蓴鱸君自適山中泉石我徒勞興來欲駕扁舟去何處滄波有巨鼇仲冬初吉歸途即事霧慘雲愁結暮隂遊方客子正悲吟霜風有恨號平楚寒日無光下逺岑滄海齊州半搖落乾坤今昔幾消沉意長世短知誰㑹一曲商歌萬古心次韻答友見贈髙山流水趣何深萬古千秋一素琴白石清泉成雅志光風齊月負初心伏龍應羡雲生谷獨鶴不驚鴉滿林無用野夫宜揣分商家元自有甘霖和仲弟生朝兄弟趍庭鴈影翩祗今癡絶尚依然競隂莫廢經綸業愛日當知喜懼年顔樂自憐乖夙志南陔誰解補遺篇幾時得遂求田計晨夕相將理斷編錢霅溪宫人圗露冷月華白悠悠方寸心夫君渺何許悵望碧雲深饒陽小山詩卷胸中有全山華嵩亦自小孤坐對嵓姿肝腸倚天表冬日齊居雜詩五首憶昔趍庭講誦初慨然不復向迷途只今回首還思省力學工夫尚爾疏千載傳心百世師周程授受想當時乾坤萬古春風在空向篷窗事仰思二程初見濂溪夫子時濂溪年三十明道年十五伊川年十四生平不見李延平俯首孳孳亦謾生每誦斯言多感慨區區辛苦竟何成平生不見李延平可謂虛生矣此朱夫子語也擁篲摳衣志未酬哲人已矣更何求微言尚省蒙私淑願得終身事逺逰豫取靜修先生詩語以逺逰名齊聖門道大若天然小智區區見自偏謾抱遺編時自惜光隂去矣又中年中秋不見月蕭颯西風起暮愁無端隂翳掩晴秋何當放出中天月重照山河十二州故縣道中塵事年來亦屢更此身與世淡無情弊裘羸馬嘉陽道只有雲山管送迎文山隱居詩卷西山緣底淡無姿便擬從君問所知告我雲烟最佳處眼中連棟有深期子溫賢友臨别求言不容以病廢辭勉書二詩為贈後篇兼簡王君儀伯一笑平生蹤跡嘆孤危尚友千年謾所思才氣如君更知已可能分手易前期誰遣林宗解隱憂更堪搖落對清秋慿君寄問觀光客底事哦詩擬四愁儀伯詩有是句故及和杜才卿韻病軀疏散愧非才只辦求田問舍來說似幽花應解語為誰零落為誰開夀李翁八十詩三首并序翁名椿字夀卿本維揚故家國初北渡客雲朔間轉徙至真定槀坡之西管鎮始以陶為業器不苦窳有約必信逺近化之中年以後買田力穡不二十年為里巨族資質直不喜矯飾好施豫不飲酒今年八十步履輕健耳目聰明食肉躍馬如平日不少衰翁媪相樂孫曽滿前其必有以得之矣兹鎮實先玊峰君舊隱比嵗冬余以羸疾來居且幸以詩書教其鄉人子弟翁請余處其别館而使其孫興宗執几杖之役嵗久而翁不余厭也翁長家君一嵗故余以父執事之其子居實將以閏月吉日合鄉里族姻置酒張樂以為翁夀義不可無語謾賦近體以侑夀觴時大德十年歲在丙午默庵安某書洛疇五福古難并四福還因好德生開秩九齡從此始更期夀域看升平餘慶懸知積德深昭昭神理古猶今寄言戲綵賢孫子食息無忘愛日心近親自合存忠養涉世髙年亦我師平昔行窩還有幾并留陳跡記它時杏花始開連日大風不獲一賞晨起携笻往觀之歸而小酌得三絶句生紅和露滴胭脂又到芳春寂寞時便擬提壺花下醉欲愁羞殺背隂枝白白紅紅春意深惡風吹折五更心化工自與時消息莫負清吟酒滿斟杖藜吟繞去還來收拾春光入酒杯自是風花要題品等閒蜂蝶莫相猜友人西城探梅折一枝來贈求詩為賦二首愁烟苦霧鎖春光誰遣邊城有艷陽珍重故人相贈意可無佳句為平章俗草凡花久亂真小窗驚見一枝春憑君欲問調羮信只恐幽香不認人别賦一首鐵石心腸氷玊姿此生惟許嵗寒知興來欲草梅花賦不解能書婉媚詞默庵集卷二
